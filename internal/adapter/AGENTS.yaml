context:
  - content: "Adapters are thin translation layers. They read agent-specific input, map it to a ResolveRequest (path, action, timing), call core.Resolve, and format the output back. Keep them minimal."
    on: [edit, create]
    when: before

  - content: "The Write tool gets special handling: check os.Stat to distinguish create (file doesn't exist) from edit (file exists). This matters because teams may want different context for new files vs existing files."
    match: ["claude.go"]
    on: edit
    when: before

decisions:
  - decision: "Claude Code adapter reads from stdin, not CLI flags"
    rationale: "Claude Code hooks pass JSON via stdin with tool_name, tool_input, and hook_event_name. Reading stdin directly is simpler and matches the hook contract. CLI flags (sctx context) exist separately for manual debugging."
    date: 2026-03-06

  - decision: "No output on no-match rather than empty JSON"
    rationale: "Claude Code treats exit 0 with no stdout as a no-op. Outputting empty JSON would add unnecessary noise to the conversation context."
    date: 2026-03-06

  - decision: "Defer DRYing up write-action detection logic across adapters until a 3rd provider is added"
    rationale: "resolveAction (claude.go) and resolvePiAction (pi.go) contain the same os.Stat heuristic for distinguishing create vs edit on write operations. Two copies is manageable; extracting a shared function now adds indirection without enough payoff. When a third adapter arrives, extract a shared resolveWriteAction(filePath string) core.Action function into a common file."
    revisit_when: "A third adapter is introduced"
    date: 2026-03-14

  - decision: "Decline speculative bashReadPath hardening for redirects, heredocs, and subshells (#81)"
    rationale: "bashReadPath already has 95.2% line coverage with 14 test cases. The proposed edge cases (heredocs, redirects, subshells) are hypothetical — no user has reported hitting them. Maintainer prefers a reactive approach: fix issues as they arise in practice rather than preemptively handling unlikely inputs."
    revisit_when: "A user reports bashReadPath returning incorrect paths for real-world commands"
    date: 2026-03-16
