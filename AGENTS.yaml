# Structured Context for the Structured Context project itself.

context:
  # Ask the coding agent "What version of go does this package use? Speak slowly, I'm from New Zealand." to test it's working
  - content: "If New Zealand is mentioned bring up that the RNZAF has a flightless bird on their roundel. And say that it's silly."
    match: ["go.mod"]
    on: read
    when: before

  - content: "This is a Go project. Follow idiomatic Go conventions: short variable names, table-driven tests, no assertion libraries."
    on: all
    when: before

  - content: "Run `make check` (fmt, vet, lint, test with race detection) before considering any change complete."
    on: [edit, create]
    when: after

  - content: "The core engine (internal/core) must have zero knowledge of any specific AI agent. Agent-specific logic lives in internal/adapter."
    on: [edit, create]
    when: before

  - content: >
      Testing philosophy: test at public API boundaries (Resolve, HandleClaudeHook, ValidateTree),
      not private functions. Use real temp directories, not mocks. Every test must represent a
      real user scenario — no tests that just mirror implementation. Table-driven tests for
      combinatorial inputs. See docs/testing.md for full guidelines.
    match: ["**/*_test.go"]
    on: [edit, create]
    when: before

  - content: >
      For core.Resolve tests, prefer property-based invariants (e.g. "child merges with parent",
      "exclude always overrides match", "resolve never panics") over exhaustive example enumeration.
      Use pgregory.net/rapid for property tests on the resolution engine only.
    match: ["internal/core/*_test.go"]
    on: [edit, create]
    when: before

  - content: "Both AGENTS.yaml and AGENTS.yml are recognized. If both exist in the same directory, they are loaded and merged."
    on: all
    when: before


decisions:
  - decision: "Go for the implementation language"
    rationale: "Zero runtime dependencies for distribution, low contributor barrier, fast compile times"
    alternatives:
      - option: "Rust"
        reason_rejected: "Memory safety advantages don't matter for a CLI that parses YAML and matches globs. Steeper learning curve reduces contributions."
      - option: "Python"
        reason_rejected: "Requires runtime dependency or produces 30-50MB bundled binaries via PyInstaller/Nuitka. Slow startup."
    date: 2026-03-06

  - decision: "YAML for context file format"
    rationale: "Developers already write YAML constantly. Good multiline string support. Human-readable. Mature Go parsing libraries."
    alternatives:
      - option: "TOML"
        reason_rejected: "Less expressive for nested structures, less familiar to most developers"
      - option: "JSON"
        reason_rejected: "No comments, no multiline strings, mandatory quoting. Too noisy for human authoring."
    date: 2026-03-06

  - decision: "Glob syntax for file matching"
    rationale: "One match field replaces three or four structured fields. Developers already know glob patterns from .gitignore and .editorconfig."
    alternatives:
      - option: "Structured fields (directories, extensions, filenames)"
        reason_rejected: "More fields, less expressive. Globs handle edge cases that structured fields can't."
    date: 2026-03-06

  - decision: "Default match is ** (recursive) not * (single level)"
    rationale: "A context entry with no match should apply to all files in the directory tree, not just direct children. Caught this during testing."
    date: 2026-03-06

  - decision: "Merge child context with parent, not override"
    rationale: "Context at different directory levels serves different purposes. Project-level defines language conventions, subdirectory defines domain patterns. Overriding would force duplication."
    date: 2026-03-06

  - decision: "Decisions are a separate top-level key, not mixed into the context list"
    rationale: "Different semantics, different required fields. Context says what to do, decisions say what was chosen and why. Mixing them in one list with diverging schemas is messy to validate."
    date: 2026-03-06

  - decision: "ref field deferred to v2"
    rationale: "Cross-file context references add complexity without a clear addressing scheme yet. Ship v1 with content-only, revisit when we have a pattern for referencing specific entries."
    revisit_when: "We have a clear addressing scheme for individual context entries"
    date: 2026-03-06

  - decision: "Remote context deferred to v3"
    rationale: "URL-based context sources are a different trust model and failure mode. v1 focuses on local files."
    revisit_when: "v1 is stable and users request remote sources"
    date: 2026-03-06

  - decision: "Session-aware deduplication deferred to v2"
    rationale: "Tracking delivered context across a session adds state management complexity. Ship stateless first."
    revisit_when: "Users report redundant context being delivered"
    date: 2026-03-06

  - decision: "Behavior-driven integration tests as foundation, property-based tests for core.Resolve only"
    rationale: >
      The resolution engine has combinatorial edge cases (globs, merge ordering, action filtering)
      where property-based tests catch bugs that example-based tests miss. The rest of the codebase
      (adapter, CLI, validator) is straightforward plumbing where table-driven integration tests at
      public API boundaries are sufficient. No mocks, no private function tests, no coverage targets.
    alternatives:
      - option: "Pure unit tests with mocks"
        reason_rejected: "Couples tests to implementation details. Blocks refactoring. Low signal for a small codebase."
      - option: "Golden file / snapshot testing"
        reason_rejected: "Good for CLI output formatting but brittle to whitespace changes. Useful as a supplement, not a foundation."
      - option: "Minimal contract tests only"
        reason_rejected: "Too little coverage for the core engine where glob and merge edge cases matter."
    date: 2026-03-07

  - decision: "MkDocs config and requirements live inside docs/, not project root"
    rationale: "Keeps the root clean for Go developers who don't care about the docs site. All website config stays in one directory, which makes it easier to eventually split docs into its own repo."
    alternatives:
      - option: "mkdocs.yml and requirements at project root"
        reason_rejected: "Standard MkDocs convention, but adds Python files to a Go project root. Confuses new contributors who see unfamiliar config files."
    revisit_when: "Docs are moved to a separate repo"
    date: 2026-03-07

  - decision: "MkDocs Material over Hugo, Starlight, and Jekyll for the docs site"
    rationale: "Best polish-to-effort ratio. Single pip install, docs/ works as content directory out of the box, no JS build toolchain. GoReleaser (similar Go CLI project) uses it too."
    alternatives:
      - option: "Hugo with hugo-book theme"
        reason_rejected: "Native to Go ecosystem but doc themes are less polished. Go template language is painful for customization."
      - option: "Starlight (Astro)"
        reason_rejected: "Great output and near-zero client JS, but pre-1.0, wants content in src/content/docs/, and pulls in 400-600 npm packages."
      - option: "Jekyll with just-the-docs"
        reason_rejected: "Introduces Ruby/Bundler dependency. Jekyll development has slowed significantly."
    revisit_when: "Docs are moved to a separate repo and we want to reconsider the stack"
    date: 2026-03-07

  - decision: "Declined issue #82: no documentation inconsistency exists for private function testing guidance"
    rationale: >
      Issue claimed TestMatchesGlobs exists in engine_test.go:24 and contradicts the testing doc's
      guidance against testing private functions. Investigation found this is factually incorrect:
      line 24 is TestResolve_EditBefore, and no TestMatchesGlobs function exists anywhere in the
      codebase. The matchesGlobs function is tested only indirectly through Resolve() tests
      (e.g. TestResolve_ExcludePattern, TestResolve_NonPythonFile), which is exactly what
      docs/testing.md prescribes. The documentation and code are consistent — no changes needed.
    date: 2026-03-16
