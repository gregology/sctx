site_name: Structured Context
site_url: https://sctx.dev
site_description: Scoped, structured context for AI agents. Drop AGENTS.yaml files into your codebase and agents get the right guidance at the right time.
docs_dir: .
site_dir: ../site
repo_url: https://github.com/gregology/sctx
repo_name: gregology/sctx
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - llmstxt:
      markdown_description: |
        sctx replaces monolithic instruction files with distributed AGENTS.yaml files placed throughout a codebase. When an AI agent edits a file, sctx discovers nearby AGENTS.yaml files, filters their instructions by glob patterns and action type, and delivers only the relevant context just-in-time. This ensures agents receive precise, scoped guidance instead of an overwhelming wall of instructions.
      full_output: llms-full.txt
      sections:
        Getting Started:
          - getting-started.md: Installation via Homebrew, go install, or binary download; Claude Code integration setup
        Core Concepts:
          - context.md: How to write context entries with match, exclude, on, and when filters
          - decisions.md: Recording rejected alternatives, constraints, and revisit conditions
        Documentation:
          - examples.md: Complete AGENTS.yaml files for dbt, APIs, React, Terraform, and monorepos
          - protocol.md: File discovery, resolution algorithm, merge behavior, and validation rules for implementors
          - cli-reference.md: CLI commands including hook, context, decisions, validate, init, claude enable/disable
          - comparisons.md: How sctx differs from AGENTS.md, MCP, llms.txt, and .cursorrules
        Optional:
          - contributing.md: Building, testing, and contributing
          - roadmap.md: Planned features for v2 and v3

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Context entries: context.md
  - Decisions: decisions.md
  - Examples: examples.md
  - Protocol: protocol.md
  - CLI reference: cli-reference.md
  - Comparisons: comparisons.md
  - Contributing: contributing.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gregology/sctx
